- type: constructionGraph
  id: Anvil
  start: start
  graph:
  - node: start
    actions:
    - !type:DestroyEntity { }
    edges:
    - to: anvil
      steps:
      - tag: AnvilItem
        icon:
          sprite: _CP14/Structures/Specific/Blacksmith/anvil.rsi
          state: icon
        name: construction-graph-tag-anvil
  - node: anvil
    entity: CP14WorkbenchAnvilPlaced
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: CP14WorkbenchAnvilItem
        amount: 1
      steps:
      - tool: Screwing
        doAfter: 1
