- type: entity
  id: PlanetStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: PlanetGameRulesTable

- type: entityTable
  id: PlanetGameRulesTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: EntitySpawnTable

- type: entityTable
  id: EntitySpawnTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: PlanetSlimesSpawn
    - id: PlanetCarpsSpawn
    - id: PlanetFleshlingsSpawn

- type: entity
  id: PlanetSlimesSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAudio:
      path: /Audio/Announcements/attention.ogg
    weight: 2
    earliestStart: 30
    reoccurrenceDelay: 15
  - type: PlanetEntitySummonRule
    table: !type:GroupSelector
      rolls: 1, 1
      children:
      - id: MobAdultSlimesBlueAngrySmasher
      - id: MobAdultSlimesGreenAngrySmasher
      - id: MobAdultSlimesYellowAngrySmasher

- type: entity
  id: PlanetCarpsSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAudio:
      path: /Audio/Announcements/attention.ogg
    weight: 5
    earliestStart: 30
    reoccurrenceDelay: 15
  - type: PlanetEntitySummonRule
    table: !type:GroupSelector
      rolls: 1, 4
      children:
      - id: MobCarp

- type: entity
  id: PlanetFleshlingsSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAudio:
      path: /Audio/Announcements/attention.ogg
    weight: 3
    earliestStart: 45
    reoccurrenceDelay: 15
  - type: PlanetEntitySummonRule
    table: !type:GroupSelector
      rolls: 1, 3
      children:
      - id: MobFleshLoverSmasher
      - id: MobFleshGolemSmasher
      - id: MobFleshClampSmasher
      - id: MobFleshJaredSmasher
      - id: MobAbominationSmasher
