- type: entity
  parent: BaseItem
  id: RockItem
  name: rock
  description: Bash two of those together and see what happens.
  suffix: Full
  components:
  - type: Material
  - type: Stack
    stackType: Rock
    baseLayer: rock
  - type: Sprite
    sprite: _tc14/Objects/Items/rock.rsi
    state: "rock"
  - type: Item
    sprite: _tc14/Objects/Items/rock.rsi
    size: Normal
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Damageable
    damageModifierSet: FlimsyMetallic
  - type: Injurable
    damageContainer: Inorganic

- type: entity
  parent: RockItem
  id: RockItem1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: BaseKnife
  id: FlakingRock
  name: flaking rock
  description: Sharp rock, quite a neat tool!
  components:
  - type: Sprite
    sprite: _tc14/Objects/Items/rock.rsi
    state: "flakingrock"
  - type: Item
    sprite: _tc14/Objects/Items/rock.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Damageable
    damageModifierSet: FlimsyMetallic
  - type: Injurable
    damageContainer: Inorganic
  - type: Construction
    graph: FlakingRock
    node: flakingRock
  - type: Tool
    qualities:
    - Slicing
    speedModifier: 0.5
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
        Slash: 5
  - type: Tag
    tags:
    - FlakingRock


