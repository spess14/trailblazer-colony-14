- type: entity
  abstract: true
  id: BaseMoltenItem
  components:
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
        Heat: 5
  - type: DamageOnHolding
    damage:
      types:
        Heat: 10
  - type: TriggerOnSpawn
  - type: TimerTrigger
    delay: 30
    examinable: false
    popup: null
  - type: SpawnOnTrigger
    predicted: true
    keysIn:
    - timer
  - type: DeleteOnTrigger
    keysIn:
    - timer

- type: entity
  parent: IngotBase
  id: IngotSteel
  name: steel ingot
  description: A big ingot made out of steel.
  components:
  - type: Sprite
    sprite: _tc14/Objects/Materials/ingots.rsi
    state: steel
  - type: Item
    sprite: _tc14/Objects/Materials/ingots.rsi
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: PhysicalComposition
    materialComposition:
      Steel: 500

- type: entity
  parent: [IngotSteel, BaseMoltenItem]
  id: IngotMoltenSteel
  name: molten steel ingot
  description: Don't touch it without smithing gloves!
  components:
  - type: Construction
    graph: Smithing
    node: start
  - type: Sprite
    state: molten-steel
  - type: SpawnOnTrigger
    proto: IngotSteel

- type: entity
