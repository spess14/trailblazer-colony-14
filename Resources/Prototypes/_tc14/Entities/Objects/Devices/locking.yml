- type: entity
  id: Lock
  name: lock
  description: Can be added to a door to lock it.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: _tc14/Objects/Devices/lock.rsi
    state: lock
  - type: PhysicalLock
