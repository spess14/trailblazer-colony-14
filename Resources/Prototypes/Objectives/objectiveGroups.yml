# Traitor
- type: weightedRandom
  id: TraitorObjectiveGroups
  weights:
    # Moffstation - Start - Reweighing tables for picker. Keep original proto so we can keep up with any upstream changes
    TraitorObjectiveGroupSteal: 0.25
    TraitorObjectiveGroupKill: 1
    TraitorObjectiveGroupState: 0.25 #As in, something about your character. Alive, dead, arrested, gained an ability...
    TraitorObjectiveGroupSocial: 0.5 #Involves helping/harming others without killing them or stealing their stuff
    TraitorObjectiveGroupSabotage: 0.5
    TraitorObjectiveGroupOther: 0.5
    # Moffstation - End

- type: weightedRandom
  id: TraitorObjectiveGroupSteal
  weights:
    CaptainIDStealObjective: 0.5  # Moffstation - Objective picker adjustments
    CMOHyposprayStealObjective: 1
    CMOCrewMonitorStealObjective: 1
    RDHardsuitStealObjective: 1
    NukeDiskStealObjective: 0.25  # Moffstation - Objective picker adjustments
    MagbootsStealObjective: 1
    CorgiMeatStealObjective: 1
    ClipboardStealObjective: 1
    KnuckleDustersStealObjective: 1
    CaptainGunStealObjective: 0.5
    CaptainJetpackStealObjective: 0.5
    HandTeleporterStealObjective: 0.5
    EnergyMagnumStealObjective: 0.5

- type: weightedRandom
  id: TraitorObjectiveGroupKill
  weights:
    KillRandomPersonObjective: 1
    KillStationAiObjective: 0.25
    KillRandomHeadObjective: 0.25
    TeachLessonObjective: 1 # Moffstation - teach lesson objective

- type: weightedRandom
  id: TraitorObjectiveGroupState
  weights:
    EscapeShuttleObjective: 1
    DieObjective: 0.01 # Moffstation - Objective picker adjustments
    #HijackShuttleObjective: 0.02

- type: weightedRandom
  id: TraitorObjectiveGroupSocial
  weights:
#    RandomTraitorAliveObjective: 1 - Removed because the objective was boring and didn't progress the round.
    RandomTraitorProgressObjective: 1
    # Moffstation - Start - Social traitor objectives
    GatherIntelObjective: 1
    JailbreakObjective: 0.5
    LeaveCallingCardObjective: 0.5
    LeaveCallingCardOnPersonObjective: 0.5
    # Moffstation - End

- type: weightedRandom
  id: TraitorObjectiveGroupSabotage
  weights:
    SupercritAnomaliesObjective: 1
    # Moffstation - Sabotage objectives
    DisruptDepartmentObjective: 1
    SabotageObjective: 0.5
    # Moffstation - End

#misc objectives that don't fall other another category
- type: weightedRandom
  id: TraitorObjectiveGroupOther
  weights:
    HijackTradeStationObjective: 1
    # Moffstation - Location based objectives
    TrashRoomObjective: 1
    ClaimLocationObjective: 1
    # Moffstation - End


