- type: entity
  parent: BaseGameRule
  id: WizardDuel
  components:
  - type: LoadMapRule
    mapPath: /Maps/_Moffstation/Nonstations/wizards-court.yml
  - type: RuleGrids
  - type: AntagLoadProfileRule
  - type: GameRule
    minPlayers: 35
  - type: AntagObjectives
    objectives:
    - WizardDuelistMeetObjective
    - WizardDuelistRelocateObjective
    - WizardDuelistDemonstrateObjective
  - type: AntagSelection
    agentName: wizard-round-end-name
    selectionTime: PrePlayerSpawn
    antags:
    - !type:FixedAntagCount
      proto: WizardDuelistRed
    - !type:FixedAntagCount
      proto: WizardDuelistBlue
    - !type:FixedAntagCount
      proto: WizardDuelistViolet
  - type: DynamicRuleCost
    cost: 150

- type: antagSpecifier
  parent: RestrictedAntag
  id: BaseWizardDuelist
  abstract: true
  prefRoles:
  - WizardDuelist
  roleLoadout:
  - JobWizardDuelist
  briefing:
    color: Turquoise
  components:
  - type: NpcFactionMember
    factions:
    - Wizard
  - type: RandomMetadata
    nameSegments:
    - NamesWizardFirst
    - NamesWizardLast
    nameFormat: name-format-wizard

- type: antagSpecifier
  parent: BaseWizardDuelist
  id: WizardDuelistRed
  spawnerPrototype: SpawnPointGhostWizardDuelistRed
  briefing:
    text: wizard-duelist-red-role-greeting
    color: Turquoise
  startingGear: WizardDuelistRedGear
  mindRoles:
  - MindRoleWizardDuelistRed

- type: antagSpecifier
  parent: BaseWizardDuelist
  id: WizardDuelistBlue
  spawnerPrototype: SpawnPointGhostWizardDuelistBlue
  briefing:
    text: wizard-duelist-blue-role-greeting
    color: Turquoise
  startingGear: WizardDuelistBlueGear
  mindRoles:
  - MindRoleWizardDuelistBlue

- type: antagSpecifier
  parent: BaseWizardDuelist
  id: WizardDuelistViolet
  spawnerPrototype: SpawnPointGhostWizardDuelistViolet
  briefing:
    text: wizard-duelist-violet-role-greeting
    color: Turquoise
  startingGear: WizardDuelistVioletGear
  mindRoles:
  - MindRoleWizardDuelistViolet
