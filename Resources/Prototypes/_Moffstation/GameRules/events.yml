# Derelict service cyborg spawn
- type: entity
  parent: BaseDerelictCyborgSpawn
  id: DerelictServiceCyborgSpawn
  components:
  - type: AntagSpawner
    prototype: PlayerServiceBorgDerelictGhostRole
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: DerelictServiceCyborg

- type: antagSpecifier
  parent: DerelictCyborg
  id: DerelictServiceCyborg
  spawnerPrototype: SpawnPointGhostDerelictServiceCyborg

# Pirate corsair
- type: entity
  parent: BasePiratesRule
  id: PirateCorsairSpawn
  components:
  - type: StationEvent
    earliestStart: 30
    weight: 5.5
    minimumPlayers: 30
    duration: null
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Moffstation/Shuttles/shuttle-sp-sparrow.yml
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: PirateCorsair
  - type: DynamicRuleCost
    cost: 75

# Syndicate dead drop
- type: entity
  parent: BaseGameRule
  id: SyndicateDeadDrop
  components:
  - type: StationEvent
    startAnnouncement: station-syndicate-dead-drop-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    earliestStart: 25
    duration: 1
    minimumPlayers: 1
    maxOccurrences: 2
    weight: 10
  - type: RandomSpawnRule
    prototype: SyndieDeadDropSpawner
    radioMessage:
      channel: Syndicate
      message: "syndicate-dead-drop-announcement"

# Syndicate soldier spawn
- type: entity
  parent: BaseAntagGhostRoleRule
  id: SyndieVentSoldierSpawn
  components:
  - type: StationEvent
    earliestStart: 20
    weight: 4
    duration: null
    maxOccurrences: 2
  - type: AntagRandomSpawn
  - type: AntagLoadProfileRule
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: SyndieVentSoldier
  - type: DynamicRuleCost
    cost: 25
