- type: entity
  parent: BaseGameRule
  id: Vampire
  components:
  - type: GameRule
    minPlayers: 25
  - type: VampireRule
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    lateJoinAdditional: true
    antags:
    - !type:FixedAntagCount
      proto: Vampire

- type: antagSpecifier
  parent: RestrictedAntag
  id: Vampire
  prefRoles:
  - Vampire
  briefing:
    text: roles-antag-vampire-briefing
    color: Crimson
    sound: "/Audio/_Moffstation/Ambience/Antags/vampire_start.ogg"
  allowNonHumans: true
  components:
  - type: Vampire
  - type: BloodEssenceUser
    bloodWhitelist:
    - Blood
    - InsectBlood
    - Slime
    - Sap
    - CopperBlood
    - AmmoniaBlood
    - ZombieBlood
  - type: Damageable
    damageModifierSet: Vampire
  - type: Injurable
    damageContainer: BiologicalMetaphysical
  - type: BurnedBySun
    tileBlacklist:
    - Lattice
    - TrainLattice
    - Space
    damage:
      types:
        Heat: 30
  - type: OrganSwap
    organSwaps:
      Heart: OrganVampireHeart
      Lungs: OrganVampireLungs
      Stomach: OrganVampireStomach
  - type: Store
    name: vampire-store-name
    categories:
    - VampireAbilitiesBasic
    - VampireAbilitiesGargantua
    - VampireAbilitiesHaemomancer
    - VampireAbilitiesUmbrae
    - VampireAbilitiesDantalion
    currencyWhitelist:
    - BloodEssence
    balance:
      BloodEssence: 0
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: BloodConsumption
    healPerUpdate:
      types:
        Holy: -0.5
        Blunt: -1.2
        Slash: -1.2
        Piercing: -1.2
        Heat: -0.5
        Cold: -0.5
        Shock: -0.5
        Asphyxiation: -2.0
        Poison: 0.6
        Radiation: 0.6
        Cellular: -1.0
  - type: Temperature
    currentTemperature: 283.15 # 10C, vampires are naturally cold.
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 150 # Vampires are undead, cold shouldn't harm them unless it's extreme
    coldDamage:
      types:
        Cold: 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      275: 0.8
      250: 0.6
      225: 0.4
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 600
    maxBleedAmount: 0.0
    bleedPuddleThreshold: 1000.0
    bloodlossThreshold: 0.02
    bloodlossDamage:
      types:
        Bloodloss: 0.1 # if they're out of blood they're taking bloodloss damage
    bloodlossHealDamage:
      types:
        Bloodloss: -1.0
    bloodRefreshAmount: 0.0 # Gets handled by the BloodConsumptionSystem
  mindRoles:
  - MindRoleVampire
