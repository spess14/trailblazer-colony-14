#I tried to make a base pdaAd so that they didn't all have to have the sprite path, but it kept crashing :godo:

# WHEN YOU MAKE AN AD, CREATE PROTOTYPE BELOW, AND THEN ADD THE ID AND WEIGHT HERE
- type: weightedRandom
  id: AdWeights
  weights:
    anti-union: 6 #moomoobeef - nanotrasen anti-union propoganda
    arcade: 4 #moomoobeef - arcade nostalgia night
    booze: 3 #moomoobeef - booze general ad
    buy: 2.5 #drbadvice - buy
    CARPpockets: 5 #dayvei - carp donk pockets
    dans-halfoff: 7 #drbadvice - discount dan's half off
    donk-pockets: 5 #moomoobeef - donk pockets general ad
    error1: 1.5 #moomoobeef - SSL error
    getsmore: 7 #drbadvice - getsmore chocolate
    janitor: 7 #moomoobeef - janitor PSA
    luxury-pens: 3 #moomoobeef - luxury pens
    nanomed: 6 #moomoobeef - nanomed, topicals still exist
    Nomads: 4 #moomoobeef - nomad's brand cigarettes
    plasteel-chef: 5 #moomoobeef - plasteel chef silverware vendor
    pride-o-mat: 6 #moomoobeef - pride-o-mat vendor
    secad: 8 #dayvei - join security!
    security-watches: 0.75 #moomoobeef - security watches. based on the poster
    smite: 6 #moomoobeef - You want a smite cranberry?
    smoke2: 5 #drbadvice - shadycigs general ad
    smoke3: 5 #moomoobeef - smoking general ad

- type: pdaAd
  id: anti-union
  sprite:
    sprite: _Moffstation/Interface/PDA/advertisements.rsi
    state: anti-union

