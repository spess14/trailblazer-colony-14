- type: entity
  parent: BaseStorageItem
  id: MedkitBase
  description: It's an emergency medical kit for those serious boo-boos.
  abstract: true
  components:
  - type: Sprite
    layers:
    - map: [ base ]
      state: icon
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
  - type: Appearance
  - type: Item
    size: Large
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1
  - type: PhysicalComposition
    materialComposition:
      Plastic: 150
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  - type: Tag
    tags:
    - Medkit

- type: entity
  parent: MedkitBase
  id: Medkit
  name: first aid kit
  description: It's an emergency medical kit for those serious boo-boos.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Specific/Medical/firstaid.rsi
    state: icon
  - type: Item
    sprite: _Moffstation/Objects/Specific/Medical/firstaid.rsi

