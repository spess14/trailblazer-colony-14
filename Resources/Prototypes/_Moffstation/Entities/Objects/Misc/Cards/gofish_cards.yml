# Go Fish Cards
- type: entity
  parent: BasePlayingCardDeckBox
  id: GoFishCardDeckBox
  name: box of go fish cards
  suffix: GoFish
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
  - type: ContainerFill
    containers:
      storagebase:
      - GoFishCardDeck

- type: entity
  parent: BasePlayingCardDeck
  id: GoFishCardDeck
  name: deck of cards
  suffix: GoFish
  components:
  - type: Sprite
    layers:
    - state: empty # Dummy layer because the actual visuals are composed dynamically.
      sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
      visible: False
  - type: PlayingCardDeck
    prototype: StandardGoFishCards

# GoFish Deck Definitions
- type: playingCardDeck
  id: StandardGoFishCards
  sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
  commonReverseLayers:
  - state: singlecard_down_gofish
  cardNameLoc: gofish-card-name
  cardDescLoc: gofish-card-desc
  cardReverseNameLoc: gofish-card-name-reverse
  cardReverseDescLoc: gofish-card-desc-reverse
  suitLoc: gofish-card-suit-name
  cardValueLoc: gofish-card-value-name
  cards:
  #- id: rules
  - prototype: GoFishRulesCard
  - suit: GoFishBlue
  - suit: GoFishGreen
  - suit: GoFishRed
  - suit: GoFishYellow

- type: entity
  parent: [ BasePlayingCard ]
  id: GoFishRulesCard
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
    state: rules
  - type: Paper # Don't want to parent off BasePaper or Paper to avoid inheriting PaperVisuals and Sprite layers.
    editingDisabled: true # No one can change the rules of the game. Not even god...
    content: gofish-card-rules-content
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: PlayingCard
    obverseLayers:
    - state: rules
      sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
    reverseLayers:
    - state: singlecard_down_gofish
      sprite: _Moffstation/Objects/Misc/Cards/card_gofish.rsi
    name: Go Fish! Rules Card
    reverseName: playing card
    description: This is the rules card! You may read it to get a better understanding of the rules.

