#Centcomm & Command

- type: entity
  parent: IDCardStandard
  id: CentcomInternIDCard
  name: central command intern ID card
  components:
  - type: Sprite
    layers:
    - state: silver
    - state: stripe_bottom
      color: "#309000"
    - state: stripe_top
      color: "#99ff98"
    - sprite: &icon-rsi _Moffstation/Interface/Misc/job_icons.rsi
      offset: &icon-offset -0.09375, 0.0625
      state: CentralCommandIntern
  - type: Item
    heldPrefix: silver
  - type: PresetIdCard
    job: CentralCommandIntern
  - type: NanoChatCard # CD
    listNumber: false

