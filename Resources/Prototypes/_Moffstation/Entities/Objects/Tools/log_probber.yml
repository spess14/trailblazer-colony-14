- type: entity
  parent: [ BaseItem ]
  id : LogProbe
  name: log probe
  description: a device able to recover the log history from some machines.
  components:
  - type: Item
    sprite: _Moffstation/Objects/Tools/log_probber.rsi
  - type: Sprite
    sprite: _Moffstation/Objects/Tools/log_probber.rsi
    state: icon
    layers:
    - state: icon
  - type: LogProbe
  - type: UserInterface
    interfaces:
      enum.LogProbeUiKey.Key:
        type: LogProbeBoundUserInterface
  - type: ActivatableUI
    key: enum.LogProbeUiKey.Key
    inHandsOnly: true

