- type: entity
  parent: FoodSnackBase
  id: FoodSnackChits
  name: chits
  description: A bag of fried cotton made by moths for moths!
  components:
  - type: FlavorProfile
    flavors:
    - oily
    - cottons
  - type: Sprite
    sprite: _Moffstation/Objects/Consumable/Food/snacks.rsi
    state: chits
  - type: Item
    heldPrefix: chits
  - type: Edible
    trash:
    - FoodPacketChitsTrash
  - type: Tag
    tags:
    - FoodSnack
    - ClothMade
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 5
      - ReagentId: Fiber
        Quantity: 10

- type: entity
  parent: FoodPacketTrash
  id: FoodPacketChitsTrash
  name: chits
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Consumable/Food/snacks.rsi
    state: chits-trash
