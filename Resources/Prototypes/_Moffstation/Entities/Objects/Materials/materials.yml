- type: entity
  parent: MaterialBase
  id: MaterialHideSharkminnow
  name: Raw Sharkminnow Hide
  description: Hastily cut hide from the belly of a Sharkminnow. Full of excess tissue that needs to be cut away.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Materials/hide.rsi
    state: raw
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialHideSharkminnowTrimmed
      amount: 1
  - type: Item
    heldPrefix: sharkminnowhide
    sprite: _Moffstation/Objects/Materials/hide.rsi
  - type: StaticPrice
    price: 500

- type: entity
  parent: MaterialBase
  id: MaterialHideSharkminnowTrimmed
  name: Trimmed Sharkminnow Hide
  description: Trimmed hide from the belly of a Sharkminnow. Needs to be frozen in order to preserve it.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Materials/hide.rsi
    state: trimmed
  - type: Construction
    graph: SharkminnowFrozen
    node: start
    defaultTarget: preserved sharkminnow hide
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        # less mass so it can cook faster, a single strip of bacon isnt 5kg
        density: 1
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  # let air cook and freeze meat for cooking and preservation
  - type: AtmosExposed
  - type: Temperature
    currentTemperature: 290
  - type: TemperatureDamage
  # required for cooking to work
  - type: InternalTemperature
    thickness: 0.02
    area: 0.02 # arbitrary number that sounds right for a slab of meat
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Meaterial: 300
  - type: Item
    heldPrefix: sharkminnowhide
    sprite: _Moffstation/Objects/Materials/hide.rsi
  - type: StaticPrice
    price: 585

- type: entity
  parent: MaterialBase
  id: MaterialHideSharkminnowFrozen
  name: Preserved Sharkminnow Hide
  description: Preserved hide from the belly of a Sharkminnow. Heat up with space cleaner to finish the process.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Materials/hide.rsi
    state: frozen
  - type: Construction
    graph: SharkminnowFrozen
    node: preserved sharkminnow hide
  - type: Item
    heldPrefix: sharkminnowhide
    sprite: _Moffstation/Objects/Materials/hide.rsi
  - type: StaticPrice
    price: 1000

- type: entity
  parent: MaterialBase
  id: MaterialLeatherSharkminnow
  name: Sharkminnow Leather
  description: Ready to be used leather from the belly of a Sharkminnow. Drastically reduces any friction.
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Materials/hide.rsi
    state: leather
  - type: Item
    heldPrefix: sharkminnowhide
    sprite: _Moffstation/Objects/Materials/hide.rsi
  - type: Tag
    tags:
    - SharkminnowLeather
  - type: StaticPrice
    price: 2000
