# This was peeled off of upstream's `TelecomServer`. Changes to that prototype from upstream should be carefully
# considered to be added here or there, depending on whether it should affect just the machine variant, or all variants
# of the server.
- type: entity
  id: BaseTelecomServer
  abstract: true
  components:
  - type: TelecomServer
  - type: Machine
    board: TelecomServerCircuitboard
  - type: EncryptionKeyHolder
    keysExtractionMethod: Prying
    keySlots: 10
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      key_slots: !type:Container
  - type: WiresVisuals
  - type: WiresPanel
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        telecom-on:
          True: { visible: true }
          False: { visible: false }
        variant-common:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-cargo:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-engineering:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-medical:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-science:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-sec:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-service:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-command:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-default:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-multiple:
          True: { shader: unshaded }
          False: { shader: shaded }
        variant-nokey:
          True: { shader: unshaded }
          False: { shader: shaded }
