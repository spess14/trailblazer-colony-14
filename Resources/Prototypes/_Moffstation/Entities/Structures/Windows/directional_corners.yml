- type: entity
  parent: WindowClockworkDirectional
  id: WindowClockworkDirectionalCorner
  suffix: Corner
  components:
  - type: Sprite
    sprite: _Moffstation/Structures/Windows/directional.rsi
    state: clock_window_corner
  - type: Icon
    sprite: _Moffstation/Structures/Windows/directional.rsi
    state: clock_window_corner
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,-0.28125,-0.28125"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    trackAllDamage: true
    damageOverlay:
      sprite: _Moffstation/Structures/Windows/cracks_directional_corner.rsi

