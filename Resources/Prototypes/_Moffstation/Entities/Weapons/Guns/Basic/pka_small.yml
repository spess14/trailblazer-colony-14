- type: entity
  parent: BaseItem
  id: WeaponProtoKineticAcceleratorIntegrated
  name: integrated proto-kinetic accelerator
  description: NT miraculously managed to save up to 33.4% by producing a weaker version of the proto-kinetic accelerator and redesigned it for use by cyborgs. 
  components:
  - type: Sprite
    sprite: _Moffstation/Objects/Weapons/Guns/Basic/kinetic_accelerator_integrated.rsi
    layers:
    - state: icon
    - state: animation-icon
      visible: false
      map: [ "empty-icon" ]
  - type: Item
    sprite: _Moffstation/Objects/Weapons/Guns/Basic/kinetic_accelerator_integrated.rsi
    size: Large
    shape:
    - 0,0,2,1
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    angleDecay: 45
    minAngle: 1
    maxAngle: 2
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg
    projectileSpeed: 25
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
        #todo: add other 'empty' animations
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.75
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletKineticSmall
    capacity: 1
    count: 1
  - type: UseDelay
    delay: 0
  - type: UpgradeableGun
    whitelist:
      tags:
      - PKAUpgrade
  - type: ContainerContainer
    containers:
      upgrades: !type:Container
