# Cyborg switchable types
- type: entity
  id: BorgChassisScience
  parent: BorgChassisSelectable
  name: science cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: science

# Pirate Cyborg
- type: entity
  id: BorgChassisPirate
  parent: BaseBorgChassis
  name: pirate assault cyborg
  description: A hardy machine, built for killin' landlubbers.
  components:
  - type: NpcFactionMember
    factions:
    - Pirate
  - type: Sprite
    sprite: _Moffstation/Mobs/Silicon/pirate_borg_chassis.rsi
    layers:
    - state: pirate
    - state: pirate_e
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: pirate_l
      shader: unshaded
      map: ["light"]
      visible: false
  - type: Access
    tags:
    - Pirate
  - type: AccessReader
    access: [["Pirate"]]
  - type: BorgChassis
    maxModules: 3
    moduleWhitelist:
      tags:
      - BorgModulePirate
    hasMindState: pirate_e
    noMindState: pirate
  - type: SiliconLawProvider
    laws: PirateLawset
    subverted: true
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - Pirate
  - type: ActiveRadio
    channels:
    - Pirate
  - type: MovementAlwaysTouching
  - type: Speech
    speechSounds: SyndieBorg
    allowedEmotes:
    - Laugh
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconSyndicate
  - type: InteractionPopup
    interactSuccessString: petting-success-syndicate-cyborg
    interactFailureString: petting-failure-syndicate-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: LawProgrammerTarget
    durationMultiplier: 10

- type: entity
  id: BorgChassisPirateBattery
  parent: BorgChassisPirate
  name: pirate assault cyborg
  description: A hardy machine, built for killin' landlubbers.
  suffix: Battery, Module, Pirate
  components:
  - type: ContainerFill
    containers:
      borg_brain:
      - PositronicBrain
      borg_module:
      - BorgModulePirate
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

# Derelict service cyborg
- type: entity
  parent: BaseBorgChassisDerelict
  id: ServiceBorgChassisDerelict
  name: derelict service cyborg
  description: A man-machine hybrid that assists the service department. It's a bigger mess than anything it can clean up.
  components:
  - type: Sprite
    sprite: _Moffstation/Mobs/Silicon/Chassis/service_derelict.rsi
    layers:
    - state: borg
      map: ["movement"]
    - state: borg_e_r
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: borg_l
      shader: unshaded
      map: ["light"]
      visible: false
  - type: BorgChassis
    maxModules: 7 # One less module slot than the regular module to reflect this being a "broken" cyborg.
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleService
    hasMindState: borg_e
    noMindState: borg_e_r

  #Station Ai Shell
- type: entity
  parent: BaseBorgChassis
  id: PlayerAiShell
  name: empty shell
  description: A shell, inhabitable by the Station's AI. Carrying it around and throwing it is discouraged, but not prohibited.
  components:
  - type: ContainerFill
    containers:
      borg_brain:
      - AIShellBrain
  - type: Sprite
    sprite: _Moffstation/Mobs/Silicon/Chassis/aishells.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: aishell
    - state: aishell_e
      map: [ "enum.BorgVisualLayers.Light" ]
      shader: unshaded
      visible: false
    - state: aishell_l
      shader: unshaded
      map: [ "light" ]
      visible: false
  - type: DamageStateVisuals
    states:
      Alive:
        Base: aishell
      Critical:
        Base: aishell_dead
      Dead:
        Base: aishell_dead
  - type: Inventory
    templateId: aiShell
  - type: RandomMetadata # overriding parent component so spawned prototypes have the correct name
    nameSegments: null
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: ActiveRadio
    channels:
    - Binary
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: BorgChassis
    maxModules: 1
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
    hasMindState: aishell_e
    noMindState: aishell_e_r
  - type: MultiHandedItem
  - type: Item
    size: Huge
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Critical
      100: Dead
  - type: Destructible
    generateOverkillThreshold: false
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - borg_brain
        - borg_module
        - cell_slot
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: GuideHelp
    guides:
    - AIShells
    - Robotics
  - type: Access
    groups:
    - AllAccess
  - type: NameIdentifier
    group: Null
  - type: AccessReader
    access: [ [ "Command" ], [ "Research" ] ]
  - type: NpcFactionMember
    factions:
    - NanoTrasen
  - type: ShowJobIcons
  - type: ShowCrewIcons

- type: entity
  id: PlayerAiShellBattery
  parent: PlayerAiShell
  suffix: Battery
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium

