#random spawner - add variations to the list
- type: entityTable
  id: RandomMothroach
  table: !type:GroupSelector
    children:
    - id: MobMothroach
    - !type:GroupSelector
      weight: 0.5
      children:
      - id: MobMothroachRosy
      - id: MobMothroachDeathshead
    - !type:GroupSelector
      weight: 0.05
      children:
      - id: MobMothroachMechroach
    - !type:GroupSelector
      weight: 0.005
      children:
      - id: MobMothroachSyndie

- type: entity
  parent: MarkerBase
  id: RandomMothroachSpawner
  name: Mothroach Spawner
  suffix: Random
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: Mobs/Animals/mothroach/mothroach.rsi
      state: mothroach
  - type: EntityTableSpawner
    offset: 0.2
    table: !type:NestedSelector
      tableId: RandomMothroach
