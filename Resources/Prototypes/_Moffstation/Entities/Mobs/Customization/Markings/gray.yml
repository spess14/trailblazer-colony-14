# Eye Markings

- type: marking
  id: GrayEyes
  bodyPart: Eyes
  groupWhitelist: [ Gray ]
  coloring:
    layers:
      eyes:
        type: !type:EyeColoring
      eyes_glimmer:
        type: !type:SimpleColoring
          color: "#eeefff"
  sprites:
  - sprite: &eyes.rsi "_Moffstation/Mobs/Customization/Gray/eyes.rsi"
    state: eyes
  - sprite: *eyes.rsi
    state: eyes_glimmer

- type: marking
  id: GrayTiredEyes
  bodyPart: Eyes
  groupWhitelist: [ Gray ]
  coloring:
    layers:
      tiredeyes:
        type: !type:EyeColoring
      tiredeyes_glimmer:
        type: !type:SimpleColoring
          color: "#eeefff"
      tiredeyes_ridge:
        type: !type:SkinColoring
  sprites:
