- type: entity
  parent: BaseAntagSpawner
  id: SpawnPointGhostWizardDuelistBase
  name: ghost role spawn point
  categories: [ HideSpawnMenu, Spawner ]
  components:
  - type: GhostRole
    name: ghost-role-information-wizard-duelist-name
    description: ghost-role-information-wizard-duelist-desc
    mindRoles:
    - MindRoleWizard
    raffle:
      settings: default
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Clothing/Head/Hats/wizardhat.rsi
      state: icon

