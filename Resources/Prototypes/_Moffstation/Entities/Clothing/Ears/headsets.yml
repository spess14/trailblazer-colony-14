- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetPirate
  name: pirate headset
  description: A headset used by a band thieving pirates.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyPirate
  - type: Sprite
    sprite: Clothing/Ears/Headsets/freelance.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/freelance.rsi

- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetSyndicateInfiltrator
  name: syndicate infiltrator headset
  description: An experimental modular syndicate intercom favored among spies and infiltrators. The inside of it hums eerily. (there are 6 key slots.).
  components:
  - type: ContainerFill
    containers:
      key_slots: []
  - type: EncryptionKeyHolder
    keySlots: 6
  - type: Sprite
    sprite: _Moffstation/Clothing/Ears/Headsets/syndicate.rsi
  - type: Clothing
    sprite: _Moffstation/Clothing/Ears/Headsets/syndicate.rsi
