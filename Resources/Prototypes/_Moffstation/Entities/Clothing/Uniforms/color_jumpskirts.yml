# White Jumpskirt
- type: entity
  parent: ClothingUniformSkirtBase
  id: ClothingUniformJumpskirtColorWhite
  name: white jumpskirt
  description: A generic white jumpskirt with no rank markings.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Uniforms/Jumpskirt/jumpskirt.rsi
    layers:
    - state: icon
    - state: basics-trinkets-icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Clothing
    sprite: _Moffstation/Clothing/Uniforms/Jumpskirt/jumpskirt.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
      - state: basics-trinkets-equipped-INNERCLOTHING

