# White Jumpsuit
- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformJumpsuitColorWhite
  name: white jumpsuit
  description: A generic white jumpsuit with no rank markings.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Uniforms/Jumpsuit/jumpsuit.rsi
    layers:
    - state: icon-light
    - state: basics-trinkets-icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Clothing
    sprite: _Moffstation/Clothing/Uniforms/Jumpsuit/jumpsuit.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING-light
      - state: basics-trinkets-equipped-INNERCLOTHING

# Grey Jumpsuit
