- type: entity
  parent: [ClothingNeckBase, BaseCommandContraband]
  id: ClothingNeckCapeCaptain
  name: captain's formal cape
  description: An elegant and superfluous cape for only the most graceful of Nanotrasen captains.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Neck/captain-cape.rsi
  - type: StealTarget
    stealGroup: HeadCloak

- type: entity
  parent: ClothingNeckCloakMoth
  id: ClothingNeckCloakIris
  name: orange moth cloak
  suffix: Admin
  description: A cloak in the form of moth wings is an unusual and original element of the wardrobe that can attract the attention of others. It is made of a thin fabric imitating moth wings, with soft and fluffy edges. The raincoat is fastened around the neck with straps, and has a hood in the shape of a moths head.
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Neck/iriscloak.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodIris
    requiredSlot:
    - neck
    slot: head

