- type: entity
  parent: ClothingBackpackPurse
  id: ClothingBackpackPurseSpawner
  name: purse 
  suffix: Random
  components:
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: ClothingBackpackPurse
      - id: ClothingBackpackPurseFake
    offset: 0


- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackPurse
  name: purse
  suffix: Authentic
  description: A cute, well-stitched faux leather purse. The inside is lined with velvet. The label inside says "Genuine Nian Trade Guild."
  components:
  - type: Sprite
    sprite: _Moffstation/Clothing/Back/Purses/purse.rsi
  - type: Storage
    grid: # hellshaped
    - 0,0,0,0
    - 2,0,3,0
    - 5,0,6,0
    - 8,0,9,0
    - 11,0,12,0
    - 14,0,14,0
    # NOW FOR ROW 2 :3333
    - 0,1,1,1 
    - 3,1,4,1
    - 7,1,7,1
    - 10,1,11,1
    - 13,1,14,1 
    # let's hear it for row #3
    - 1,2,2,3 # 2x2 pocket, lower left
    - 4,2,6,3 # a singular 3x2 block, all other shapes are 1x4 or 2x2
    - 8,2,9,3 # a cozy 2x2
    - 12,2,13,3 # 2x2 pocket, lower right
    # row 4
    - 0,3,0,3
    - 10,3,10,3
    - 14,3,14,3
    # final shape: 40 slot
    # x_xx_xx_xx_xx_x
    # xx_xx__x__xx_xx
    # _xx_xxx_xx__xx_
    # xxx_xxx_xxx_xxx
  - type: StaticPrice
    price: 50
  - type: MeleeWeapon # hands off my purse!
    wideAnimationRotation: 25
    damage:
      types:
        Blunt: 0.2
    soundHit:
      collection: WeakHit

- type: entity
  parent: ClothingBackpackPurse
  id: ClothingBackpackPurseFake
  name: purse
  suffix: Counterfeit
  description: A cute faux leather purse. The inside is lined with velvet. The label inside says "MNK".
  components:
  - type: StaticPrice
    price: 15 
  - type: Damageable # Shoddy stitching!
    damageContainer: Inorganic
  - type: DamageOnHit # Falls apart after a few hits.
    damage:
      types:
        Blunt: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 6
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: DeliveryOpenSounds
          params:
            volume: 8
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid: # hellshaped and SMALLER than real purse
    - 0,0,1,0
    - 3,0,3,0
    - 6,0,7,0
    - 9,0,9,0
    - 12,0,14,0
    - 14,0,14,2 
    # NOW FOR ROW 2 :3333
    - 0,1,0,1
    - 2,1,4,1
    - 8,1,9,2
    - 11,1,12,1
    # let's hear it for row #3
    - 1,2,2,2
    - 4,2,4,2
    - 5,2,6,3
    - 11,2,11,2
    # finally, row 4
    - 0,3,1,3
    - 3,3,3,3
    - 8,3,8,3
    - 11,3,13,3
    # final shape: 36 slot
    # xx_x__xx_x__xxx
    # x_xxx___xx_xx_x
    # _xx_xxx_xx_x__x
    # xx_x_xx_x__xxx_
