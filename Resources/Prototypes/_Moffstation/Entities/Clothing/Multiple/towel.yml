
- type: entity
  parent: BaseTowel
  id: TowelColorPurple
  name: purple towel
  components:
  - type: Sprite
    layers:
    - state: icon
      color: &towel-purple "#9C0DE1"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: *towel-purple
      right:
      - state: inhand-right
        color: *towel-purple
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: *towel-purple
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: *towel-purple
      belt:
      - state: equipped-BELT
        color: *towel-purple
  - type: Fiber
    fiberColor: fibers-purple

