- type: entity
  id: EffectFlashBluespace
  categories: [ HideSpawnMenu ]
  components:
  - type: ESTimedDespawn
    lifetime: 1
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Effects/Lightning/lightningbolt.ogg
  - type: TriggerOnSpawn
  - type: ESSparkOnTrigger
    count: 8
    sparkPrototype: MoffEffectSparksBluespace
  # spawns on portals, should stay in the same spot
  - type: PortalBlacklist

- type: entity
  parent: EffectFlashBluespace
  id: EffectFlashRedspace
  categories: [ HideSpawnMenu ]
  components:
  - type: ESTimedDespawn
    lifetime: 1.75
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Moffstation/Effects/redspace_thunderclap.ogg
  - type: ESSparkOnTrigger
    count: 8
    sparkPrototype: MoffEffectSparksRedspace
