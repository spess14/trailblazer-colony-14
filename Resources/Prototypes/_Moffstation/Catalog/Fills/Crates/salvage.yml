- type: entity
  parent: CrateGenericSteel
  id: CrateCompoundBow
  name: compound bow crate
  description: Contains one Compound Bow with a quiver full of carp teeth arrows for use by salvage.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: CompoundBow
          amount: 1
        - id: ClothingBeltQuiverCarpFill
          amount: 1

- type: entity
