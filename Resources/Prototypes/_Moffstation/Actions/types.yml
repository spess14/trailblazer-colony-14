- type: entity
  id: ActionMorphGeras
  name: Morph into Geras
  description:  Morphs you into a Geras - a miniature version of you which allows you to move fast, at the cost of your inventory.
  components:
  - type: ConfirmableAction
    popup: geras-transformation-popup
  - type: Action
    itemIconStyle: BigAction
    useDelay: 30 # prevent spam
    priority: 20
    icon:
      sprite: Mobs/Aliens/slimes.rsi
      state: blue_adult_slime
  - type: InstantAction
    event: !type:MorphGeras

- type: entity
  parent: BaseAction
  id: ActionSonicBoom
  name: Sonic Boom
  description: Emit a shockwave which flings everything around you.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _Moffstation/Interface/Actions/actions_mothroach.rsi
      state: shockwave
    itemIconStyle: BigAction
    useDelay: 15.0
  - type: InstantAction
    event: !type:AbilitySonicBoomEvent
