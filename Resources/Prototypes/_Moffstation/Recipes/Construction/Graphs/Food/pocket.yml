# warm donk-pocket
- type: constructionGraph
  id: WarmDonk
  start: start
  graph:

  - node: start
    edges:
    - to: warm donk-pocket
      completed:
      - !type:PlaySound
        sound: /Audio/_Moffstation/Effects/donksizzle.ogg
      steps:
      - minTemperature: 335

  - node: warm donk-pocket
    entity: FoodDonkpocketWarm

