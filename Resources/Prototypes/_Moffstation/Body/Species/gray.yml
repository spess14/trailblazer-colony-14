- type: entity
  parent:
  - AppearanceGray
  - BaseSpeciesMobOrganic
  id: MobGray
  name: Urist McGlorp
  components:
  - type: Damageable
    damageModifierSet: Gray
  - type: GrayAccent
  - type: Speech
    speechSounds: PVC
  - type: TypingIndicator
    proto: gray
  - type: Vocal
    sounds:
      Male: UnisexGray
      Female: UnisexGray
      Unsexed: UnisexGray
  - type: DamageVisuals
    thresholds: [ 10, 20, 30, 50, 70, 100 ]
    targetLayers:
    - "enum.HumanoidVisualLayers.Chest"
    - "enum.HumanoidVisualLayers.Head"
    - "enum.HumanoidVisualLayers.LArm"
    - "enum.HumanoidVisualLayers.LLeg"
    - "enum.HumanoidVisualLayers.RArm"
    - "enum.HumanoidVisualLayers.RLeg"
    damageOverlayGroups:
      Brute:
        sprite: _Moffstation/Mobs/Effects/Gray/brute_damage.rsi
        color: "#5e4cb0"
      Burn:
        sprite: _Moffstation/Mobs/Effects/Gray/burn_damage.rsi
  - type: Temperature
    specificHeat: 35
  - type: TemperatureDamage # survive in colder spaces cause sppaaaaaaaAAAAaaaacceee
    heatDamageThreshold: 333
    coldDamageThreshold: 215
    coldDamage:
      types:
        Cold: 0.1 # Per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 # Per second, scales with temperature & other constants
  - type: Barotrauma # Survive in lower pressure than most cause sssppppaaAAAAaaacceeee
    damage:
      types:
        Blunt: 0.25
        Heat: 0.1
  - type: TemperatureProtection
    heatingCoefficient: 1.2
    coolingCoefficient: 0.50
  - type: Bloodstream
    bloodReferenceSolution:
        reagents:
        - ReagentId: GrayBlood
          Quantity: 300
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.5
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 105 #tiny
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer


