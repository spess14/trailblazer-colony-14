- type: markingsGroup
  parent: Undergarments
  id: Gray
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.Special:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Eyes:
      limit: 1
      required: true
      default: [ GrayEyes ]
    enum.HumanoidVisualLayers.LLeg:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 5
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.UndergarmentBottom:
      limit: 2
      required: false
      nudityDefault: [ UndergarmentBottomOnePieceGray ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceGray
  name: gray appearance
  components:
  - type: Sprite # Drawlayers. Top to bottom in order I believe.
    netsync: false
    layers:
    # Torso
    - map: [ "enum.HumanoidVisualLayers.Chest" ]

    # Head
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]

    # Limbs
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]

    # Underwear
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: [ "jumpsuit" ]

    # Extremities
    - map: [ "enum.HumanoidVisualLayers.LHand" ]
    - map: [ "enum.HumanoidVisualLayers.RHand" ]
    - map: [ "enum.HumanoidVisualLayers.LFoot" ]
    - map: [ "enum.HumanoidVisualLayers.RFoot" ]

    # More equipment
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "eyes" ]
    - map: [ "id" ]
    - map: [ "outerClothing" ]
    - map: [ "belt" ]
    - map: [ "back" ]
    - map: [ "neck" ]

    # Stuff that appears above equipment.
    - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
    - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
    - map: [ "enum.HumanoidVisualLayers.Tail" ]
    - map: [ "enum.HumanoidVisualLayers.TailOverlay" ]

    # Stuff that goes in front of stuff that goes in front of equipment
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]

    # Extras
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ] # Custom cuffs currently don't appear, #38451 tries to fix it is stuck in limbo.
      color: "#ffffff"
      sprite: _Moffstation/Objects/Misc/handcuffs.rsi
      state: body-overlay-gray
      visible: false
    - map: [ "clownedon" ]
      sprite: "_Moffstation/Effects/creampie.rsi"
      state: "creampie_gray"
      visible: false
