- type: gameMap
  id: Ossuary
  mapName: 'Ossuary'
  mapPath: /Maps/_Moffstation/ossuary.yml
  maxRandomOffset: 0
  randomRotation: false
  minPlayers: 11 # Ultra-Low Pop
  maxPlayers: 35 # Ultra-Low Pop
  stations:
    Ossuary:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Ossuary {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_Moffstation/Shuttles/emergency_ossuary.yml
        - type: StationCargoShuttle
          path: /Maps/_Moffstation/Shuttles/cargo_ossuary.yml
        - type: StationJobs
          availableJobs: # 20 jobs total w/o latejoins, 28 jobs total w/ latejoins
            #command (3)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            #service (5)
            Bartender: [ 1, 1 ]
            Botanist: [ 1, 1 ]
            Chef: [ 1, 1 ]
            Janitor: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            #engineering (2 - 3)
            AtmosphericTechnician: [ 1, 1 ]
            StationEngineer: [ 1, 2 ]
            #medical (2 - 3)
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 1, 2 ]
            #science (1 - 2)
            Scientist: [ 1, 2 ]
            #security (2 - 4)
            SecurityOfficer: [ 1, 3 ]
            Detective: [ 1, 1 ]
            #supply (2 - 4)
            SalvageSpecialist: [ 1, 2 ]
            CargoTechnician: [ 1, 2 ]
            #civilian (2+)
            Passenger: [ -1, -1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #silicon (1 - 2)
            Borg: [ 1, 2 ]
