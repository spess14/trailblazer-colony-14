- type: gameMap
  id: Ossuary
  mapName: 'Ossuary'
  mapPath: /Maps/_Moffstation/ossuary.yml
  maxRandomOffset: 0
  randomRotation: false
  minPlayers: 0
  maxPlayers: 20
  stations:
    Ossuary:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Ossuary {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_Moffstation/Shuttles/emergency_ossuary.yml
        - type: StationCargoShuttle
          path: /Maps/_Moffstation/Shuttles/cargo_ossuary.yml
        - type: StationJobs
          availableJobs: # Roundstart: 20, Latejoin: 27
            #command
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            #service
            Bartender: [ 1, 1 ]
            Botanist: [ 1, 1 ]
            Chef: [ 1, 1 ]
            Janitor: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            #engineering
            AtmosphericTechnician: [ 1, 1 ]
            StationEngineer: [ 1, 2 ]
            #medical
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 1, 2 ]
            #science
            Scientist: [ 1, 2 ]
            #security
            SecurityOfficer: [ 1, 2 ]
            Detective: [ 1, 1 ]
            #supply
            SalvageSpecialist: [ 1, 2 ]
            CargoTechnician: [ 1, 2 ]
            #civilian
            Passenger: [ -1, -1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #silicon
            Borg: [ 1, 2 ]
