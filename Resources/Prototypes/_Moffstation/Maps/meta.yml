- type: gameMap
  id: Meta
  mapName: 'Meta Station'
  mapPath: /Maps/_Moffstation/meta.yml
  minPlayers: 61 # High Pop
  maxPlayers: 95 # High Pop
  stations:
    Meta:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Meta Station {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'TG'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_meta.yml
        - type: StationJobs
          availableJobs: # 66 jobs total w/o latejoins, 80 jobs total w/ latejoins
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (14 - 16)
            Bartender: [ 2, 2 ]
            Botanist: [ 2, 3 ]
            Chef: [ 2, 2 ]
            Janitor: [ 2, 3 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 2, 2 ]
            Reporter: [ 2, 2 ]
            #engineering (8 - 10)
            AtmosphericTechnician: [ 3, 3 ]
            StationEngineer: [ 5, 6 ]
            #medical (7 - 10)
            Chemist: [ 2, 2 ]
            MedicalDoctor: [ 4, 6 ]
            Paramedic: [ 1, 2 ]
            #science (6 - 8)
            Scientist: [ 6, 8 ]
            #security (12)
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 7, 7 ]
            Detective: [ 1, 1 ]
            Lawyer: [ 2, 2 ]
            Prisoner: [ 1, 1 ]
            #supply (7 - 9)
            SalvageSpecialist: [ 3, 3 ]
            CargoTechnician: [ 4, 6 ]
            #civilian (3+)
            Passenger: [ -1, -1 ] #infinite, not counted
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #silicon (5)
            StationAi: [ 1, 1 ]
            Borg: [ 4, 4 ]
