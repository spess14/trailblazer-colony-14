- type: entity
  parent: BaseGameRule
  id: BloodBrothers
  components:
  - type: GameRule
    minPlayers: 10
    cancelPresetOnTooFewPlayers: false # Moffstation
    delay:
      min: 240
      max: 420
  - type: BloodBrotherRule
  - type: AntagRandomObjectives
    sets:
    - groups: BloodBrotherObjectiveGroups
    maxDifficulty: 7.5
  - type: AntagSelection
    agentName: blood-brothers-round-end-agent-name
    selectionTime: PrePlayerSpawn
    antags:
    - !type:LinearAntagCount
      proto: BloodBrother
      range:
        max: 2
        playerRatio: 20 # if I counted right this should be about 40 players for 2 BBs

- type: antagSpecifier
  parent: RestrictedAntag
  id: BloodBrother
  prefRoles: [ BloodBrother ]
  blacklist:
    components:
    - AntagImmune
  briefing:
    text: blood-brother-initial-role-greeting
    color: MediumVioletRed
    sound: /Audio/_Harmony/Misc/blood_brother_greeting.ogg
  components:
  - type: BloodBrother
  - type: InitialBloodBrother
  mindRoles:
  - MindRoleBloodBrother

