- type: entity
  parent: [ OrganBaseArmRight, OrganThavenExternal ]
  id: OrganThavenArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganThavenExternal ]
  id: OrganThavenHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganThavenExternal ]
  id: OrganThavenHandRight

