- type: markingsGroup
  parent: Undergarments
  id: Thaven
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.HeadTop:
      limit: 5
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: true
      default: [ ThavenEars1 ]
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 5
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.TailOverlay:
      limit: 6
      required: false
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false
  appearances:
    enum.HumanoidVisualLayers.HeadSide:
      matchSkin: true

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceThaven
  categories: [ HideSpawnMenu ]
  name: thaven appearance
  components:
  - type: Inventory
    speciesId: thaven
    templateId: thaven
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Thaven/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Thaven/displacement.rsi
            state: outerclothing_hardsuit
      head:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Thaven/displacement.rsi
            state: head
      gloves:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Thaven/displacement.rsi
            state: hands
  - type: InitialBody
    organs:
      Torso: OrganThavenTorso
      Head: OrganThavenHead
      ArmLeft: OrganThavenArmLeft
      ArmRight: OrganThavenArmRight
      HandRight: OrganThavenHandRight
      HandLeft: OrganThavenHandLeft
      LegLeft: OrganThavenLegLeft
      LegRight: OrganThavenLegRight
      FootLeft: OrganThavenFootLeft
      FootRight: OrganThavenFootRight
      Brain: OrganThavenBrain
      Eyes: OrganThavenEyes
      Lungs: OrganThavenLungs
      Heart: OrganThavenHeart
      Stomach: OrganThavenStomach
      Liver: OrganThavenLiver
      Kidneys: OrganThavenKidneys
  - type: HumanoidProfile
    species: Thaven
  - type: CreamPied
    sprite:
      sprite: _Moffstation/Effects/creampie.rsi
      state: creampie_thaven

- type: entity
  parent:
  - AppearanceThaven
  - BaseSpeciesMobOrganic
  id: MobThaven
  name: Urist McEars
  components:
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#ff624a"
  - type: Damageable
    damageModifierSet: Thaven
  - type: Butcherable
    spawned:
    - id: FoodThavenMeat
      amount: 5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ShimmeringBlood
        Quantity: 600
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120 # dainty fucking elves
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: TypingIndicator
    proto: thaven # DeltaV unique typing indicator
  - type: Vocal
    sounds:
      Male: MaleThaven
      Female: FemaleThaven
  - type: Speech
    speechSounds: Alto
  - type: ThavenAccent
  - type: StrangeMoods
    mood: ThavenMoods
  - type: IonStormTarget
  - type: MeleeWeapon
    attackRate: 0.55
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 18

- type: entity
  parent: OrganBase
  id: OrganThaven
  abstract: true
  suffix: thaven

- type: entity
  id: OrganThavenMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Thaven ]

- type: entity
  parent: OrganThaven
  id: OrganThavenInternal
  abstract: true
  components:
  - type: Sprite
    sprite: _MACRO/Mobs/Species/Thaven/organs.rsi
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: CarpoToxin
        Quantity: 5
  - type: FlavorProfile # organs arent actually edible RN
    flavors:
      - thavenflesh

- type: entity
  parent: OrganThaven
  id: OrganThavenExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _MACRO/Mobs/Species/Thaven/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _MACRO/Mobs/Species/Thaven/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Thaven

- type: entity
  parent: [ OrganBaseTorso, OrganThavenExternal ]
  id: OrganThavenTorso

- type: entity
  parent: [ OrganBaseHead, OrganThavenExternal ]
  id: OrganThavenHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.HeadSide
    - enum.HumanoidVisualLayers.Snout

