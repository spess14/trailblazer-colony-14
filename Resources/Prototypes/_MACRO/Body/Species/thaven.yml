  id: OrganThavenLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganThavenExternal ]
  id: OrganThavenLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganThavenExternal ]
  id: OrganThavenFootLeft

- type: entity
