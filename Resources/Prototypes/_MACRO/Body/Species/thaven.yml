  id: OrganThavenFootRight

- type: entity
  parent: [ OrganBaseBrain, OrganThavenInternal ]
  id: OrganThavenBrain
  description: "An organic positronic brain. Quite remarkable, really."

- type: entity
  parent: [ OrganBaseEyes, OrganThavenInternal, OrganThavenExternal ]
  id: OrganThavenEyes
  description: "The dark sclera have a faint, iridescent coating."
  components:
  - type: VisualOrgan
    data:
      sprite: _MACRO/Mobs/Species/Thaven/parts.rsi
      state: eyes

- type: entity
  parent: [ OrganBaseLungs, OrganThavenInternal, OrganThavenMetabolizer ]
  id: OrganThavenLungs
  description: "Technically not lungs since they don't draw chemicals from the air, these strange, durable organs use the motion of respiration to provide energy for cell maintenance."

- type: entity
  parent: [ OrganBaseHeart, OrganThavenInternal, OrganThavenMetabolizer ]
  id: OrganThavenHeart
  description: "The toxic heart of a thaven. You're wearing gloves, right?"

- type: entity
  parent: [ OrganBaseStomach, OrganThavenInternal, OrganThavenMetabolizer ]
  id: OrganThavenStomach
  description: "Surprisingly similar to the stomach of a sharkminnow."

- type: entity
  parent: [ OrganBaseLiver, OrganThavenInternal, OrganThavenMetabolizer ]
  id: OrganThavenLiver
  description: "It loosely resembles a slab of dragon flesh."

- type: entity
  parent: [ OrganBaseKidneys, OrganThavenInternal, OrganThavenMetabolizer ]
  id: OrganThavenKidneys
  description: "Shiny, coppery veins make these the most ornate kidneys known to modern science."
