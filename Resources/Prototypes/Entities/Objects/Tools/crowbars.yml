- type: entity
  abstract: true
  parent: BaseItem
  id: BaseCrowbar
  name: crowbar
  description: A multipurpose tool used for many tasks, such as prying doors or bludgeoning interdimensional invaders.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/crowbar_drop.ogg
  - type: Tag
    tags:
    - Crowbar
  - type: MeleeWeapon
    wideAnimationRotation: -90 # Moffstation
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud
  - type: Tool
    qualities:
      - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: ToolTileCompatible
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: StaticPrice
    price: 22
  - type: Prying
  - type: Sprite
    sprite: &crowbar.rsi "_Moffstation/Objects/Tools/crowbar.rsi" # Moffstation
  - type: Clothing
    sprite: *crowbar.rsi # Moffstation
    quickEquip: false
    slots:
    - Belt
  - type: Item
    sprite: *crowbar.rsi # Moffstation
    size: Small

# Standard (grey) Crowbar
- type: entity
  parent: BaseCrowbar
  id: Crowbar
  components:
  - type: Sprite
    state: icon
  - type: Item
    storedSprite:
      sprite: *crowbar.rsi # Moffstation
      state: storage

# Emergency (red) Crowbar
- type: entity
  parent: BaseCrowbar
  id: CrowbarRed
  components:
  - type: Tag
    tags:
    - Crowbar
    - CrowbarRed
  - type: Sprite
    layers:
    - state: icon
    - state: cover-icon
      color: &red "#ff2a4e" # Moffstation
  - type: Item
    storedSprite:
      state: red-storage
      sprite: *crowbar.rsi # Moffstation
    inhandVisuals:
      left:
      - state: inhand-left
      - state: cover-inhand-left
        color: *red # Moffstation
      right:
      - state: inhand-right
      - state: cover-inhand-right
        color: *red # Moffstation
  - type: Clothing
    clothingVisuals:
      belt:
      - state: equipped-BELT
      - state: cover-equipped-BELT
        color: *red # Moffstation

