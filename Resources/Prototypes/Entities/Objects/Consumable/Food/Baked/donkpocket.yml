# Base

- type: entity
  parent: [SolutionTiny, FoodInjectableBase]
  id: FoodDonkpocketBase
  abstract: true
  components:
  - type: Edible
  - type: Sprite
    sprite: _Moffstation/Objects/Consumable/Food/Baked/donkpocket.rsi # Moffstation - Uncabinetification
  - type: Extractable
    grindableSolutionName: food
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 10
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - DonkPocket
    - Meat
  # Moffstation - Start - PocketChange
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        # less mass so it can cook faster, a single strip of bacon isnt 5kg
        density: 1
        mask:
        - ItemMask
        restitution: 0.3  # fite me
        friction: 0.2
  # let air cook and freeze meat for cooking and preservation
  - type: AtmosExposed
  - type: Temperature
    currentTemperature: 290
  - type: TemperatureDamage
  # required for cooking to work
  - type: InternalTemperature
    conductivity: 0.44
    thickness: 0.005
    area: 0.0075 # ~5x15cm
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Meaterial: 300
  # Moffstation - End

# Donkpocket

# Warm gives +5 nutriment.
# Warm ones contain a small amount of Omnizine.

- type: entity
  name: donk-pocket
  parent: FoodDonkpocketBase
  id: FoodDonkpocket
  description: The food of choice for the seasoned traitor.
  components:
  - type: FlavorProfile
    flavors:
      - bread
      - meaty
      - cheap
  - type: Sprite
    state: plain
  # Moffstation - Start - PocketChange
  - type: Construction
    graph: WarmDonk
    node: start
    defaultTarget: warm donk-pocket
  # Moffstation - End

- type: entity
  parent: [SolutionFood, SolutionTiny]
  id: SolutionFoodDonkpocketWarm
  categories: [ HideSpawnMenu ] # Needed for a very specific lighter so can't be abstract
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 12
      - ReagentId: Omnizine
        Quantity: 3
      # Moffstation - Start - PocketChange
      - ReagentId: Tricordrazine
        Quantity: 4
      # Moffstation - End - PocketChange

