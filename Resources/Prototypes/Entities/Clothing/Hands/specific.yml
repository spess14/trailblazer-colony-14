- type: entity
  parent: [ClothingHandsButcherable, BaseChameleon]
  id: ClothingHandsChameleon # doesn't protect from electricity or heat
  name: black gloves
  description: Regular black gloves that do not keep you from frying.
  suffix: Chameleon
  components:
    - type: Tag
      tags: # ignore "WhitelistChameleon" tag
      - ClothMade
      - Recyclable
  # Moffstation -Start
    - type: Sprite
      sprite: &color.rsi "_Moffstation/Clothing/Hands/Color/color.rsi"
      layers:
      - state: icon
        color: "#3f3f3f"
    - type: Item
      inhandVisuals:
        left:
        - state: inhand-left
          color: "#3f3f3f"
        right:
        - state: inhand-right
          color: "#3f3f3f"
    - type: Clothing
      sprite: *color.rsi
      clothingVisuals:
        gloves:
        - state: equipped-HAND
          color: "#3f3f3f"
# Moffstation - End
    - type: ChameleonClothing
      slot: [gloves]
      default: ClothingHandsGlovesColorBlack
    - type: Fiber
      fiberMaterial: fibers-chameleon
    - type: FingerprintMask

- type: entity
  parent: ClothingHandsChameleon
  id: ClothingHandsChameleonThief
  suffix: Chameleon, Thieving
  components:
  - type: Thieving
    stripTimeReduction: 2
    stealthy: true
