# eeeplet
- type: entity
  id: EeepEvent
  parent: BaseGameRule
  components:
  - type: StationEvent
    weight: 3.5
    earliestStart: 25
    reoccurrenceDelay: 40
    minimumPlayers: 30
    duration: null
  - type: SpaceSpawnRule
    spawnDistance: 0
  - type: AntagSpawner
    prototype: MobEeeplet
  - type: AntagSelection
    agentName: ghost-role-information-eeep-name
    antags:
    - !type:FixedAntagCount
      proto: Eeplet

- type: antagSpecifier
  parent: RestrictedAntag
  id: Eeplet
  spawnerPrototype: SpawnPointGhostEeeplet
  pickPlayer: false
  mindRoles:
  - MindRoleGhostRoleTeamAntagonist

- type: entity
  id: TouristsShuttleEvent #three tourists
  parent: BaseGameRule
  components:
  - type: StationEvent
    weight: 2
    duration: null
    minimumPlayers: 25
    maxOccurrences: 1
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Moffstation/Shuttles/tourists.yml
