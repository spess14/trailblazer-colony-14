# Actions
- type: entity
  parent: BaseMentalAction
  id: ActionToggleAiShellControllerUi
  name: AI Shell
  description: Allows you to possess a shell.
  components:
  - type: Action
    priority: -9
    itemIconStyle: BigAction
    icon:
      sprite: _Moffstation/Interface/Actions/actions_ai.rsi
      state: actions_entershell
  - type: InstantAction
    event: !type:ToggleAiShellControllerUiEvent

- type: entity
  parent: BaseMentalAction
  id: ActionStopAiShellControl
  name: Exit Shell
  description: Exits your active shell and returns you to your core.
  components:
  - type: Action
    priority: -9
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: ai_core
  - type: InstantAction
    event: !type:StopAiShellControlEvent
